[flake8]
# O padrão da comunidade (usado pelo Black) é 88, para melhor legibilidade.
max-line-length = 88
extend-exclude =
    .git,
    __pycache__,
    .tox,
    .venv,
    venv,
    node_modules,
    */migrations/*,
    */staticfiles/*,
    */mediafiles/*,
    .envs/*
# Adicione plugins para melhorar a análise. Instale com:
# pip install flake8-bugbear flake8-django flake8-comprehensions
select = C,E,F,W,B,B950,D,T,C4
ignore = E501 # Ignora erro de linha muito longa, já que max-line-length cuida disso.

per-file-ignores =
    # Wildcards em settings são comuns e podem ser ignorados
    tjgohub/settings/local.py: F403,F405
    tjgohub/settings/production.py: F401,F403,F405
    tjgohub/settings/base.py: F403,F405
    # Em __init__.py é comum importar para expor em pacotes
    */__init__.py: F401